<!-- Toolbar -->
<div class="toolbar">
  <h2 class="page-title">Users</h2>
  <button class="btn btn-primary" (click)="openAddModal()">+ Add User</button>
</div>

<!-- User List -->
<div class="user-list">
  <div class="user-card" *ngFor="let user of users">
    <div class="user-card__header" (click)="toggleDetails(user.id)">
      <div class="user-card__info">
        <span class="user-card__id">#{{ user.id }}</span>
        <span class="user-card__name">{{ user.name }}</span>
      </div>
      <div class="user-card__actions">
        <button class="btn btn-sm btn-secondary" (click)="viewTask(user.id)">
            View Tasks
        </button>
        <button class="btn btn-sm btn-secondary" (click)="openEditModal(user); $event.stopPropagation()">
          Edit
        </button>
        <button class="btn btn-sm btn-danger" (click)="deleteUser(user.id); $event.stopPropagation()">
          Delete
        </button>
        <span class="user-card__chevron" [class.rotated]="expandedUsers[user.id]">▾</span>
      </div>
    </div>

    <div class="user-card__details" *ngIf="expandedUsers[user.id]">
      <p><strong>Email:</strong> {{ user.email }}</p>
    </div>
  </div>

  <div class="empty-state" *ngIf="users.length === 0">
    <p>No users yet. Click <strong>+ Add User</strong> to get started.</p>
  </div>
</div>

<!-- Modal Overlay -->
<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal__header">
      <h3>{{ modalMode === 'add' ? 'Add New User' : 'Edit User' }}</h3>
      <button class="modal__close" (click)="closeModal()">✕</button>
    </div>

    <div class="modal__body">
      <!-- Error -->
      <div class="form-error" *ngIf="formError">{{ formError }}</div>

      <!-- ID -->
      <div class="form-group">
        <label for="userId">ID <span class="required">*</span></label>
        <input
          id="userId"
          type="number"
          class="form-input"
          placeholder="Enter user ID"
          [(ngModel)]="formData.id"
          [disabled]="modalMode === 'edit'"
        />
      </div>

      <!-- Name -->
      <div class="form-group">
        <label for="userName">Name <span class="required">*</span></label>
        <input
          id="userName"
          type="text"
          class="form-input"
          placeholder="Enter full name"
          [(ngModel)]="formData.name"
        />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="userEmail">Email <span class="required">*</span></label>
        <input
          id="userEmail"
          type="email"
          class="form-input"
          placeholder="Enter email address"
          [(ngModel)]="formData.email"
        />
      </div>
    </div>

    <div class="modal__footer">
      <button class="btn btn-secondary" (click)="closeModal()">Cancel</button>
      <button class="btn btn-primary" (click)="saveUser()">
        {{ modalMode === 'add' ? 'Add User' : 'Save Changes' }}
      </button>
    </div>
  </div>
</div>
